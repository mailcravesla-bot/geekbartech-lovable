name: Build and commit dist

# Builds the production assets on every push to main and commits the
# resulting /dist folder back to the same branch so static hosts
# (Hostinger, etc.) can serve the built files directly.

on:
  push:
    branches: [main]
    paths-ignore:
      - "dist/**"
      - "**/*.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: build-and-commit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build
        run: bun run build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --staged --quiet; then
            echo "No dist changes to commit."
          else
            git commit -m "chore: build dist [skip ci]"
            git push
          fi
